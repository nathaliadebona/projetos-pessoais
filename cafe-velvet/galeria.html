<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <title>Galeria</title>
</head>
<body>
    <header>
        <h1>Café Velvet</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="cardapio.html">Cardápio</a></li>
                <li><a href="galeria.html">Galeria</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h2>Galeria</h2>
            <h3>Um pedacinho do nosso mundo</h3>
        </section>

        <section>
            <div class="galeria">
                <figure>
                    <img src="cafeteria-manha.jpg" alt="Interior da cafeteria pela manhã">
                    <figcaption>O ambiente no início da manhã</figcaption>
                </figure>
                <figure>
                    <img src="espresso.jpg" alt="Café espresso na xícara">
                    <figcaption>Nosso espresso do dia</figcaption>
                </figure>
                <figure>
                    <img src="historia.jpg" alt="Detalhes do interior da cafeteria">
                    <figcaption>Detalhes que fazem a diferença</figcaption>
                </figure>
                <figure>
                    <img src="latte-art.jpg" alt="Artes nas xícaras de latte">
                    <figcaption>A arte do latte art</figcaption>
                </figure>
                <figure>
                    <img src="croissants.jpg" alt="Bandeja de croissants que acabaram de sair do forno">
                    <figcaption>Croissants fresquinhos</figcaption>
                </figure>
                <figure>
                    <img src="blend-especial.jpg" alt="Grãos de café sendo triturados">
                    <figcaption>Preparação do nosso blend especial</figcaption>
                </figure>
                <figure>
                    <img src="cafeteria-sabado.jpg" alt="Exterior da cafeteria em um sábado a tarde">
                    <figcaption>Tarde de sábado no Velvet</figcaption>
                </figure>
                <figure>
                    <img src="vitrine-sobremesas.jpg" alt="Vitrine da cafeteria com sobremesas variadas">
                    <figcaption>Nossa vitrine de sobremesas</figcaption>
                </figure>
                <figure>
                    <img src="detalhes.jpg" alt="Bancada com itens para as fazer bebidas">
                    <figcaption>Cada cantinho tem uma história</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2025 Café Velvet. Todos os direitos reservados. Site desenvolvido por <a href="https://github.com/nathaliadebona">Nathália de Bona</a></p>
