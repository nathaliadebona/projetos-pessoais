<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/7bd2249743.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Task Flow</title>
</head>

<body>
    <header>
        <h1>TaskFlow</h1>

        <span id="data-hoje"></span>
    </header>

    <main>
        <form id="form-tarefas">
            <input type="text" id="tarefa" placeholder="Nova tarefa">

            <button type="submit" id="form-input">Adicionar</button>
        </form>

        <ul id="lista-tarefas">
            
        </ul>
    </main>

    <footer>
        <span id="tarefas-conclusao">2 de 3 tarefas concluídas</span>
        <button id="limpar-concluidas">Limpar concluídas</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
